<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SV Agency — ניתוח</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: {
                DEFAULT: "#1e3a5f",
                light: "#2a4f7c",
                dark: "#152b47",
              },
              accent: {
                DEFAULT: "#3b82f6",
                hover: "#2563eb",
              },
            },
            fontFamily: {
              sans: ["Inter", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Heebo", "Inter", system-ui, sans-serif;
        background-color: #f7f8fa;
        color: #111827;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* RTL scrollbar */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

      /* Shimmer animation for skeletons */
      @keyframes campaign-shimmer {
        0%   { background-position: -400px 0; }
        100% { background-position: 400px 0; }
      }

      /* Toast animation */
      @keyframes campaign-toast-in {
        from { opacity: 0; transform: translateY(12px) scale(0.96); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes campaign-toast-out {
        to { opacity: 0; transform: translateY(8px) scale(0.96); }
      }

      /* Modal animation */
      @keyframes campaign-modal-in {
        from { opacity: 0; transform: translateY(16px) scale(0.96); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes campaign-overlay-in {
        from { opacity: 0; } to { opacity: 1; }
      }

      /* Subtle hover lift utility */
      .campaign-card:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(15,23,42,0.08), 0 2px 4px rgba(15,23,42,0.05);
        transition: all 180ms cubic-bezier(0.2, 0, 0, 1);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
